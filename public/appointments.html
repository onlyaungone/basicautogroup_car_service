<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Appointments | BASIC.AUTOGROUP</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body data-page="appointments">
  <header class="site-header">
    <div class="site-header__inner">
      <a class="site-brand" href="/index">
        <img src="/BAG_logo_1.png" alt="BASIC.AUTOGROUP logo" />
        <span>BASIC.AUTOGROUP</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a class="site-nav__link" href="/services">Servicing</a>
        <a class="site-nav__link" href="/about">About Us</a>
        <a class="site-nav__link" href="/store">Store</a>
      </nav>
    </div>
  </header>
  <main class="page-shell">
    <section class="page-hero">
      <a class="back-link" href="/index">&larr; Back to home</a>
      <div class="page-hero__copy">
        <p class="eyebrow">My appointments</p>
        <h1>Appointment history</h1>
        <p>Review your booking details, cancel before the appointment date, or reschedule to a future slot.</p>
      </div>
    </section>

    <section class="journey-layout">
      <div class="journey-main">
        <div id="accountDetailsPanel" class="panel"></div>
        <div id="appointmentsList" class="cards"></div>
      </div>
      <aside class="journey-side">
        <div class="panel">
          <button id="signOutButton" class="btn ghost btn--wide" type="button">Sign out</button>
          <p id="appointmentsMessage" class="status"></p>
        </div>
      </aside>
    </section>
  </main>
  <footer class="site-footer">
    <div class="site-footer__inner">
      <div class="footer-meta">
        <img src="/au_flag.png" alt="Australia flag" />
        <p>BASIC.AUTOGROUP Service Centre | AUSTRALIA English &copy; ALL RIGHTS RESERVED. 2026</p>
      </div>
    </div>
  </footer>
  <script src="/app.js"></script>
</body>
</html>
